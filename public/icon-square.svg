<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Premium Dark Forest Green Background with rounded corners for tabs -->
  <rect width="512" height="512" rx="112" fill="#1A2E1A" />
  
  <!-- Modern "A" + Garage Roof Monogram in Warm Copper -->
  <!-- Pitched Roof -->
  <path d="M110 260 L256 110 L402 260" fill="none" stroke="#B87333" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Vertical Pillars (Garage Walls) -->
  <path d="M160 220 L160 410" fill="none" stroke="#B87333" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M352 220 L352 410" fill="none" stroke="#B87333" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Crossbar (forming the "A") -->
  <path d="M160 320 L352 320" fill="none" stroke="#B87333" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Craftsmanship Dot (Cream) -->
  <circle cx="256" cy="220" r="28" fill="#FCFAF7" />
</svg>
